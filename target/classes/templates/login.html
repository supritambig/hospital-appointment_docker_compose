<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login - MediBook</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; flex-direction: column; min-height: 100vh; }
        nav { background: #1a73e8; padding: 14px 32px; display: flex; justify-content: space-between; align-items: center; }
        nav .brand { color: white; font-size: 1.3rem; font-weight: 700; text-decoration: none; }
        nav a { color: #d0e4ff; text-decoration: none; margin-left: 20px; }
        .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .card { background: white; border-radius: 14px; padding: 38px; width: 100%; max-width: 420px; box-shadow: 0 4px 20px rgba(0,0,0,0.10); }
        h2 { color: #1a73e8; margin-bottom: 6px; }
        .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 26px; }
        .form-group { margin-bottom: 18px; }
        label { font-weight: 600; font-size: 0.88rem; color: #555; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 10px 13px; border: 1px solid #cdd5e0; border-radius: 8px; font-size: 0.95rem; }
        input:focus { outline: none; border-color: #1a73e8; }
        .btn { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 6px; }
        .btn:hover { background: #1558c0; }
        .hint { background: #e8f0fe; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: #3c4fa8; margin-bottom: 20px; }
        .register-link { text-align: center; margin-top: 18px; font-size: 0.9rem; color: #666; }
        .register-link a { color: #1a73e8; font-weight: 600; }
        .alert { padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; font-weight: 500; }
        .alert-danger { background: #ffebee; color: #c62828; }
        .alert-success { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
<nav>
    <a class="brand" href="/">🏥 MediBook</a>
    <div><a href="/login">Login</a><a href="/register" style="margin-left:20px">Register</a></div>
</nav>
<div class="page">
    <div class="card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to manage your appointments</p>

        <div class="hint">🔑 Admin login: <strong>admin / admin</strong></div>

        <div class="alert alert-danger"  th:if="${error}"   th:text="${error}"></div>
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Email Address</label>
                <input type="text" name="emailId" placeholder="your@email.com" required/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        <div class="register-link">New here? <a href="/register">Create an account</a></div>
    </div>
</div>
</body>
</html>
