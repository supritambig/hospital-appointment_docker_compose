<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Doctors - MediBook Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }
        nav { background: #0d47a1; padding: 14px 32px; display: flex; justify-content: space-between; align-items: center; }
        nav .brand { color: white; font-size: 1.3rem; font-weight: 700; text-decoration: none; }
        nav a { color: #b0c4f5; text-decoration: none; margin-left: 20px; font-size: 0.95rem; }
        nav a:hover { color: white; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; align-items: start; }
        .card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        h2 { color: #0d47a1; margin-bottom: 22px; }
        h3 { color: #1a73e8; margin-bottom: 18px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 11px 12px; text-align: left; border-bottom: 1px solid #e8eaf0; }
        th { background: #f0f4ff; color: #0d47a1; font-weight: 600; font-size: 0.83rem; text-transform: uppercase; }
        tr:hover { background: #fafbff; }
        .form-group { margin-bottom: 14px; }
        label { font-weight: 600; font-size: 0.85rem; color: #555; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 9px 12px; border: 1px solid #cdd5e0; border-radius: 8px; font-size: 0.9rem; }
        input:focus { outline: none; border-color: #1a73e8; }
        .btn-add { width: 100%; padding: 11px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 6px; }
        .btn-add:hover { background: #1558c0; }
        .btn-del { padding: 5px 12px; background: #e53935; color: white; border: none; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .btn-del:hover { opacity: 0.85; }
        .empty { text-align: center; padding: 40px; color: #bbb; }
    </style>
</head>
<body>
<nav>
    <a class="brand" href="/">🏥 MediBook Admin</a>
    <div>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/appointments">Appointments</a>
        <a href="/admin/doctors">Doctors</a>
        <a href="/admin/patients">Patients</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="layout">
        <!-- Doctor List -->
        <div class="card">
            <h2>👨‍⚕️ Doctors</h2>
            <div th:if="${doctors.isEmpty()}" class="empty">No doctors added yet.</div>
            <table th:unless="${doctors.isEmpty()}">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Specialization</th>
                        <th>Qualification</th>
                        <th>Phone</th>
                        <th>Available Days</th>
                        <th>Timings</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="doc, i : ${doctors}">
                        <td th:text="${i.count}"></td>
                        <td th:text="${doc.fullName}"></td>
                        <td th:text="${doc.specialization}"></td>
                        <td th:text="${doc.qualification}"></td>
                        <td th:text="${doc.phoneNumber}"></td>
                        <td th:text="${doc.availableDays}"></td>
                        <td th:text="${doc.availableTime}"></td>
                        <td>
                            <form th:action="@{/admin/doctors/delete/{id}(id=${doc.doctorId})}" method="post"
                                  onsubmit="return confirm('Remove this doctor?')">
                                <button type="submit" class="btn-del">Remove</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Add Doctor Form -->
        <div class="card">
            <h3>➕ Add New Doctor</h3>
            <form th:action="@{/admin/doctors/add}" th:object="${doctor}" method="post">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{fullName}" placeholder="Dr. John Smith" required/>
                </div>
                <div class="form-group">
                    <label>Specialization</label>
                    <select th:field="*{specialization}" required>
                        <option value="">-- Select --</option>
                        <option>Cardiologist</option>
                        <option>Dermatologist</option>
                        <option>General Physician</option>
                        <option>Neurologist</option>
                        <option>Orthopedist</option>
                        <option>Pediatrician</option>
                        <option>Psychiatrist</option>
                        <option>Radiologist</option>
                        <option>Surgeon</option>
                        <option>Gynecologist</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Qualification</label>
                    <input type="text" th:field="*{qualification}" placeholder="MBBS, MD" required/>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="number" th:field="*{phoneNumber}" placeholder="9876543210" required/>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{emailId}" placeholder="doctor@hospital.com"/>
                </div>
                <div class="form-group">
                    <label>Available Days</label>
                    <input type="text" th:field="*{availableDays}" placeholder="Mon, Wed, Fri" required/>
                </div>
                <div class="form-group">
                    <label>Available Timings</label>
                    <input type="text" th:field="*{availableTime}" placeholder="10:00 AM - 1:00 PM" required/>
                </div>
                <button type="submit" class="btn-add">Add Doctor</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
